# Competzy host-nginx config (Coolify hybrid architecture).
#
# This server terminates SSL on the host nginx and
# reverse-proxies into Coolify containers that expose their ports on
# localhost. Coolify is NOT running a proxy here — each app binds
# directly to a host port.
#
# Port assignment (set in each Coolify service's "Exposed Ports" tab):
#   :3010  → backend container (Express, internal 3000)
#   :3011  → web container     (Next.js, internal 3001)
#   :9000  → minio container   (S3 API)
#   :9001  → minio container   (web console, optional)
#
# Coolify projects already deployed on this server keep their own ports:
#   :3000  competzy.com landing (separate repo `eduversal-team/competzy-web`)
#   :3001  pathvance.com (unrelated tenant)
#   :4000  pathvance.com api    (unrelated tenant)
# Do not reuse those ports for the arena/api stack.
#
# Install:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/competzy-arena
#   sudo ln -s /etc/nginx/sites-available/competzy-arena \
#              /etc/nginx/sites-enabled/competzy-arena
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx \
#     -d api.competzy.com \
#     -d arena.competzy.com \
#     -d minio.arena.competzy.com
#
# Certbot will rewrite each server block: add a `listen 443 ssl;` half
# with `ssl_certificate` paths under /etc/letsencrypt/live/<domain>/,
# convert the existing `listen 80;` half into an HTTP→HTTPS redirect,
# and renew automatically via the certbot.timer systemd unit.

# ── api.competzy.com ───────────────────────────────────────────────────────
server {
    listen 80;
    server_name api.competzy.com;

    # Block the unsigned local-disk upload path — production traffic goes
    # through MinIO presigned URLs (the backend still serves /uploads/
    # locally for dev compatibility).
    location /uploads/ {
        return 404;
    }

    # Multer caps each file at 10 MB; allow a small overhead.
    client_max_body_size 12M;

    location / {
        proxy_pass http://localhost:3010;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        'upgrade';
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}

# ── arena.competzy.com ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name arena.competzy.com;

    location / {
        proxy_pass http://localhost:3011;
        proxy_http_version 1.1;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        'upgrade';
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# ── minio.arena.competzy.com ───────────────────────────────────────────────
# Public S3 endpoint — used by the browser when it follows a presigned URL
# generated by the backend (`MINIO_PUBLIC_URL=https://minio.arena.competzy.com`).
server {
    listen 80;
    server_name minio.arena.competzy.com;

    # MinIO objects can be larger than typical web uploads; raise the cap
    # so signed PUTs for evidence files / certificates don't 413.
    client_max_body_size 100M;

    # Streaming uploads: pass bytes through immediately instead of buffering
    # the whole request in nginx memory.
    proxy_request_buffering off;
    proxy_buffering         off;

    location / {
        proxy_pass http://localhost:9000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 300s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;
    }
}
